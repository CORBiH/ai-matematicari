# MAT-BOT — primjer nginx site konfiguracije za Hetzner VPS (reverse proxy).
# PRIMJER, ne kopija produkcije: zamijeni bot.example.com stvarnom domenom i
# postavi certbot/SSL. Prava konfiguracija živi na VPS-u
# (/etc/nginx/sites-available/) — drži je usklađenu s ovim fajlom.

server {
    listen 80;
    server_name bot.example.com;
    # certbot --nginx dodaje 301 → https i SSL blok

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # OpenAI odgovori znaju trajati; mora biti >= backend timeouta (120s)
        proxy_read_timeout 150s;
        proxy_send_timeout 150s;
        proxy_connect_timeout 10s;
    }

    # upload slika zadataka (backend limit je MAX_CONTENT_LENGTH_MB, default 20MB)
    client_max_body_size 25m;

    # iframe embed u Thinkific: NE postavljati X-Frame-Options DENY ovdje;
    # aplikacija sama šalje CSP frame-ancestors kad je FRAME_ANCESTORS postavljen.
}
